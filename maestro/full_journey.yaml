appId: com.violen/prospekt_essens_planer/prospekt_essens_planer
---
- launchApp
- assertVisible: "Wochenplaner"

# Test Navigation
- tapOn: "Vorschläge"
- assertVisible: "Essensplaner Empfehlungen"
- tapOn: "Rezepte"
- assertVisible: "Rezepte Verwalten"
- tapOn: "Import"
- assertVisible: "Prospekt Importieren"

# Test Recipe Creation
- tapOn: "Rezepte"
- tapOn:
    id: "add_recipe_fab" # I should add this ID to the FAB
- inputText: "Selbstgemachte Pizza"
- tapOn: "Erstellen"
- assertVisible: "Selbstgemachte Pizza"

# Test Fix-Product Recognition
- tapOn: "Vorschläge"
# Assuming some mock data or earlier import happened
# This checks if the dynamic brand prefix is present
- assertVisible: ".*Fix: .*"
